{% extends 'base.html' %}
{% block title %}Profile — JWT Auth{% endblock %}

{% block content %}
<div class="card">

  <div id="profile-data">
    <!-- loading state -->
    <div style="display:flex;flex-direction:column;gap:12px;animation:cardIn 0.5s ease both;">
      <div style="height:80px;background:rgba(255,255,255,0.04);border-radius:16px;border:1px solid rgba(255,255,255,0.07);"></div>
      <div style="height:44px;background:rgba(255,255,255,0.03);border-radius:10px;"></div>
      <div style="height:44px;background:rgba(255,255,255,0.03);border-radius:10px;"></div>
      <div style="height:44px;background:rgba(255,255,255,0.03);border-radius:10px;"></div>
    </div>
  </div>

  <div class="divider"></div>
  <button class="btn-danger" onclick="logout()">Sign out</button>

</div>
{% endblock %}

{% block scripts %}
{% load static %}
<script src="{% static 'js/auth.js' %}"></script>
<script>loadProfile();</script>
{% endblock %}
